# Left (central) side configuration

# OLED Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_INVERT=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_WPM=n
# Disable ZMK's built-in WPM widget — nice-oled's screen.c provides its own
# ZMK_DISPLAY_WIDGET_LISTENER(widget_wpm_status,...) and both can't coexist
CONFIG_ZMK_WIDGET_WPM_STATUS=n
CONFIG_NICE_OLED_WIDGET_WPM_GRAPH=y

# Battery — report every 30s for faster updates
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=30

# RGB Underglow
#CONFIG_ZMK_RGB_UNDERGLOW=y
#CONFIG_WS2812_STRIP=y
#CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
#CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
#CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=60
#CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=60

# BLE
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Power management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=600000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ZMK Studio (USB real-time keymap editing — central only)
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
